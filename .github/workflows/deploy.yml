name: Generate, Release and Deploy

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'

# Prevent parallel runs from conflicting on the "latest" release
concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Generate metadata.json
        run: python3 generate_metadata.py

      - name: Zip Folder Structure
        run: |
          # Create individual zips for top-level folders
          # Replace non-alphanumeric characters with hyphens for cleaner zip names
          for d in */; do
            if [ -d "$d" ] && [ "$d" != ".github/" ] && [ "$d" != ".git/" ]; then
              folder_name=$(basename "$d")
              # Clean zip name: lowercase, replace spaces & symbols with single hyphens, trim hyphens
              clean_name=$(echo "$folder_name" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9]+/-/g' | sed -E 's/^-+|-+$//g')
              zip_name="${clean_name}.zip"
              zip -r "$zip_name" "$d" -x "*.DS_Store"
            fi
          done

      - name: Create or Update Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "*.zip"
          tag: ${{ github.ref_type == 'tag' && github.ref_name || 'latest' }}
          name: ${{ github.ref_type == 'tag' && github.ref_name || 'Latest Release' }}
          body: "Automatic update of library assets and folder archives."
          allowUpdates: true
          removeArtifacts: true
          replacesArtifacts: true
          makeLatest: ${{ github.ref_type == 'tag' && 'true' || 'false' }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact for Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
