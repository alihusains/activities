name: Generate, Release and Deploy

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Generate metadata.json
        run: python3 generate_metadata.py

      - name: Zip Folder Structure
        run: |
          # Create individual zips for top-level folders
          # This assumes users want to download folders like "4-7 years"
          for d in */; do
            if [ -d "$d" ] && [ "$d" != ".github/" ] && [ "$d" != ".git/" ]; then
              folder_name=$(basename "$d")
              zip_name=$(echo "$folder_name" | tr '[:upper:]' '[:lower:]' | sed 's/ /-/g').zip
              zip -r "$zip_name" "$d" -x "*.DS_Store"
            fi
          done

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v1
        with:
          files: |
            *.zip
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || 'latest' }}
          name: ${{ github.ref_type == 'tag' && github.ref_name || 'Latest Release' }}
          body: "Automatic update of library assets and folder archives."
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact for Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
