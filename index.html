<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activity Books — Digital Library</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Bebas+Neue&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0d0d;
            --accent: #ffffff;
            --muted: #1a1a1a;
            --text-muted: #666666;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--accent);
            overflow-x: hidden;
        }
        .bebas { font-family: 'Bebas Neue', sans-serif; }
        .plus { font-family: 'Plus Jakarta Sans', sans-serif; }

        .glass {
            background: rgba(13, 13, 13, 0.8);
            backdrop-filter: blur(20px);
        }

        .breadcrumb-item:not(:last-child)::after {
            content: "/";
            margin: 0 12px;
            color: #333333;
        }

        .card-anim {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .card-anim:hover {
            transform: translateY(-4px);
            background: #1a1a1a;
        }

        .thumbnail-container {
            aspect-ratio: 4/5;
            background: #151515;
            position: relative;
        }

        canvas {
            width: 100% !important;
            height: 100% !important;
            object-fit: cover;
            opacity: 0.8;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in { animation: slideUp 0.4s ease-out forwards; }
    </style>
</head>
<body class="min-h-screen">

    <!-- Header / Navigation -->
    <nav class="fixed top-0 left-0 right-0 z-50 glass border-b border-white/5 px-8 py-6">
        <div class="max-w-[1600px] mx-auto flex justify-between items-center">
            <div class="flex items-center gap-12">
                <h1 class="bebas text-3xl tracking-widest cursor-pointer" onclick="navigateToRoot()">ACTIVITY BOOKS</h1>
                <div id="breadcrumb" class="hidden lg:flex items-center text-[10px] uppercase tracking-[0.3em] font-bold text-neutral-600">
                    <!-- Breadcrumbs injected here -->
                </div>
            </div>
        </div>
    </nav>

    <main class="pt-48 pb-24 px-8 max-w-[1600px] mx-auto">
        <!-- Section Header -->
        <div id="folder-header" class="mb-16 flex justify-between items-start">
            <div>
                <h2 id="current-folder-name" class="bebas text-8xl md:text-[10rem] leading-none mb-6">LIBRARY</h2>
                <p id="folder-stats" class="text-neutral-500 text-xs uppercase tracking-[0.3em] font-bold"></p>
            </div>
            <button id="download-folder-btn" class="hidden group bg-[#111111] border border-white/10 px-8 py-4 rounded-lg hover:bg-white hover:text-black transition-all duration-300 flex items-center gap-4">
                <span class="text-[10px] font-bold uppercase tracking-[0.2em]">Download Folder</span>
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
            </button>
        </div>

        <!-- Grid -->
        <div id="content-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-12">
            <!-- Items injected here -->
        </div>

        <div id="empty-state" class="hidden flex flex-col items-center justify-center py-40">
            <p class="uppercase tracking-[0.4em] text-[10px] font-bold text-neutral-700">No content available</p>
        </div>
    </main>

    <footer class="mt-32 border-t border-white/5 py-16 px-8">
        <div class="max-w-[1600px] mx-auto flex justify-between items-end">
            <div>
                <p class="bebas text-4xl tracking-[0.2em] text-white/20 mb-4">Iltemase Dua</p>
                <p class="text-[9px] uppercase tracking-[0.4em] text-neutral-600 font-bold">&copy; 2026 Activity Books — Digital Library</p>
            </div>
            <div class="flex gap-12 text-[9px] uppercase tracking-[0.3em] text-neutral-500 font-bold">
                <a href="#" class="hover:text-white transition-colors">Github Pages</a>
            </div>
        </div>
    </footer>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        let libraryData = null;
        let currentPath = [];

        // Dynamic detection with robust fallbacks for alihusains/activities
        const REPO_OWNER = window.location.hostname.includes('github.io')
            ? window.location.hostname.split('.')[0]
            : 'alihusains';
        const REPO_NAME = (window.location.pathname.split('/')[1] && window.location.pathname.split('/')[1] !== 'index.html')
            ? window.location.pathname.split('/')[1]
            : 'activities';

        console.log(`Configured for: ${REPO_OWNER}/${REPO_NAME}`);

        async function init() {
            try {
                const response = await fetch('metadata.json');
                libraryData = await response.json();
                handleHashChange();
                window.addEventListener('hashchange', handleHashChange);
            } catch (e) { console.error(e); }
        }

        function handleHashChange() {
            const hash = window.location.hash.replace('#', '');
            currentPath = hash ? hash.split('/').filter(p => p).map(decodeURIComponent) : [];
            render();
        }

        function navigateToRoot() { window.location.hash = ''; }
        function navigateToFolder(folderName) {
            const newPath = [...currentPath, folderName];
            window.location.hash = newPath.join('/');
        }

        function getCurrentFolder() {
            let current = libraryData;
            for (const step of currentPath) {
                const found = current.contents.find(item => item.name === step && item.type === 'directory');
                if (found) current = found;
                else break;
            }
            return current;
        }

        function render() {
            const folder = getCurrentFolder();
            const grid = document.getElementById('content-grid');
            const folderNameEl = document.getElementById('current-folder-name');
            const statsEl = document.getElementById('folder-stats');
            const breadcrumb = document.getElementById('breadcrumb');
            const downloadFolderBtn = document.getElementById('download-folder-btn');

            grid.innerHTML = '';
            folderNameEl.innerText = folder.name;

            const fileCount = folder.contents.filter(i => i.type === 'file').length;
            const dirCount = folder.contents.filter(i => i.type === 'directory').length;
            statsEl.innerText = `${dirCount} Categories / ${fileCount} Resources`;

            breadcrumb.innerHTML = `<span class="breadcrumb-item cursor-pointer" onclick="navigateToRoot()">ROOT</span>`;
            let breadPath = [];
            currentPath.forEach((step, i) => {
                breadPath.push(step);
                const isLast = i === currentPath.length - 1;
                breadcrumb.innerHTML += `<span class="breadcrumb-item ${isLast ? 'text-white' : 'cursor-pointer'}" onclick="${isLast ? '' : `window.location.hash='${breadPath.join('/')}'`}">${step.toUpperCase()}</span>`;
            });

            if (currentPath.length > 0) {
                downloadFolderBtn.classList.remove('hidden');
                const folderName = currentPath[currentPath.length - 1];
                const zipName = folderName.toLowerCase()
                    .replace(/[^a-z0-9]+/g, '-')
                    .replace(/^-+|-+$/g, '') + '.zip';

                downloadFolderBtn.onclick = (e) => {
                    e.preventDefault();
                    const url = `https://github.com/${REPO_OWNER}/${REPO_NAME}/releases/download/latest/${zipName}`;
                    console.log(`Triggering download for: ${url}`);

                    const link = document.createElement('a');
                    link.href = url;
                    link.setAttribute('download', zipName);
                    link.style.display = 'none';
                    document.body.appendChild(link);
                    link.click();
                    setTimeout(() => document.body.removeChild(link), 100);
                };
            } else {
                downloadFolderBtn.classList.add('hidden');
            }

            if (folder.contents.length === 0) {
                document.getElementById('empty-state').classList.remove('hidden');
            } else {
                document.getElementById('empty-state').classList.add('hidden');
                folder.contents.forEach(item => {
                    grid.appendChild(item.type === 'directory' ? createFolderCard(item) : createFileCard(item));
                });
            }
            window.scrollTo(0, 0);
        }

        function createFolderCard(item) {
            const div = document.createElement('div');
            div.className = 'flex flex-col group cursor-pointer fade-in';
            div.onclick = () => navigateToFolder(item.name);
            div.innerHTML = `
                <div class="thumbnail-container rounded-lg flex items-center justify-center border border-white/5 mb-6 card-anim">
                    <svg class="w-12 h-12 text-white/5 group-hover:text-white/20 transition-all duration-500" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M10 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"></path>
                    </svg>
                </div>
                <h3 class="bebas text-2xl tracking-wider mb-2">${item.name.toUpperCase()}</h3>
                <p class="text-[10px] font-bold uppercase tracking-widest text-neutral-600">${item.contents.length} Items</p>
            `;
            return div;
        }

        function createFileCard(item) {
            const div = document.createElement('div');
            div.className = 'flex flex-col group fade-in';
            const thumbId = 'thumb-' + Math.random().toString(36).substr(2, 9);
            const threshold = 20 * 1024 * 1024;
            const downloadUrl = item.size > threshold ? `https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/main/${item.path}` : item.path;

            div.innerHTML = `
                <div class="thumbnail-container rounded-lg mb-6 card-anim border border-white/5 relative overflow-hidden group">
                    <canvas id="${thumbId}"></canvas>
                    <div class="absolute inset-0 bg-black/60 opacity-0 group-hover:opacity-100 transition-all duration-300 flex items-center justify-center">
                         <a href="${downloadUrl}" download class="bg-white text-black w-12 h-12 rounded-full flex items-center justify-center hover:scale-110 transition-transform">
                             <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                         </a>
                    </div>
                </div>
                <h3 class="text-[11px] font-bold uppercase tracking-widest text-neutral-400 mb-2 truncate">${item.name}</h3>
                <p class="text-[9px] font-mono text-neutral-700">${formatSize(item.size)}</p>
            `;
            renderThumbnail(item.path, thumbId);
            return div;
        }

        async function renderThumbnail(path, canvasId) {
            try {
                const pdf = await pdfjsLib.getDocument(path).promise;
                const page = await pdf.getPage(1);
                const viewport = page.getViewport({ scale: 0.5 });
                const canvas = document.getElementById(canvasId);
                const context = canvas.getContext('2d');
                canvas.height = viewport.height;
                canvas.width = viewport.width;
                await page.render({ canvasContext: context, viewport: viewport }).promise;
            } catch (e) { console.error(path, e); }
        }

        function formatSize(bytes) {
            if (!bytes) return 'N/A';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
        }

        init();
    </script>
</body>
    </script>
</body>
</html>
