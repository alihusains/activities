<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activity Books — Digital Library</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --accent: #ffffff;
            --muted: #262626;
            --text-muted: #a3a3a3;
        }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            color: var(--accent);
            overflow-x: hidden;
        }
        .bebas { font-family: 'Bebas Neue', sans-serif; }

        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .card-anim {
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .card-anim:hover {
            transform: translateY(-8px) scale(1.02);
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .breadcrumb-item:not(:last-child)::after {
            content: "/";
            margin: 0 10px;
            color: var(--muted);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--muted); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #404040; }

        .thumbnail-container {
            aspect-ratio: 3/4;
            overflow: hidden;
            position: relative;
            background: #171717;
        }

        canvas {
            width: 100% !important;
            height: 100% !important;
            object-fit: cover;
        }

        .folder-icon {
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in { animation: fadeIn 0.6s ease-out forwards; }
    </style>
</head>
<body class="min-h-screen">

    <!-- Header / Navigation -->
    <nav class="fixed top-0 left-0 right-0 z-50 glass border-b border-white/5 px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-4">
                <h1 class="bebas text-3xl tracking-wider cursor-pointer hover:text-white/80 transition-colors" onclick="navigateToRoot()">Activity Books</h1>
                <div id="breadcrumb" class="hidden md:flex items-center text-xs uppercase tracking-widest text-neutral-500 font-semibold ml-8">
                    <!-- Breadcrumbs injected here -->
                </div>
            </div>
            <div class="flex items-center gap-4">
                <a id="download-all-btn" href="#" class="bg-white text-black px-6 py-2 rounded-full text-xs font-bold uppercase tracking-tighter hover:bg-neutral-200 transition-all flex items-center gap-2">
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                    Full Library (.zip)
                </a>
            </div>
        </div>
    </nav>

    <main class="pt-32 pb-24 px-6 max-w-7xl mx-auto">
        <!-- Folder Actions -->
        <div id="folder-header" class="mb-12 flex justify-between items-end border-b border-white/5 pb-8">
            <div>
                <h2 id="current-folder-name" class="bebas text-6xl md:text-8xl mb-2">Library</h2>
                <p id="folder-stats" class="text-neutral-500 text-sm uppercase tracking-widest"></p>
            </div>
            <button id="download-folder-btn" class="hidden group border border-white/10 px-6 py-3 rounded-xl hover:bg-white hover:text-black transition-all duration-500 flex items-center gap-3">
                <span class="text-xs font-bold uppercase tracking-widest">Download Folder</span>
                <div class="w-8 h-8 rounded-lg bg-white/5 group-hover:bg-black/10 flex items-center justify-center transition-colors">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                </div>
            </button>
        </div>

        <!-- Grid Container -->
        <div id="content-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6 md:gap-10">
            <!-- Items injected here -->
        </div>

        <div id="empty-state" class="hidden flex flex-col items-center justify-center py-40 text-neutral-600">
            <svg class="w-16 h-16 mb-4 opacity-20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 13h6m-3-3v6m5 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
            <p class="uppercase tracking-[0.3em] text-xs font-bold">No assets found</p>
        </div>
    </main>

    <!-- Footer -->
    <footer class="mt-20 border-t border-white/5 py-12 px-6">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-8">
            <div class="text-center md:text-left">
                <p class="bebas text-2xl tracking-widest text-white/40 mb-2">Iltemase Dua</p>
                <p class="text-[10px] uppercase tracking-widest text-neutral-600 font-bold">&copy; 2026 Activity Books Library</p>
            </div>
            <div class="flex gap-8 text-[10px] uppercase tracking-[0.2em] text-neutral-500 font-bold">
                <a href="#" class="hover:text-white transition-colors">Privacy</a>
                <a href="#" class="hover:text-white transition-colors">Contact</a>
                <span class="text-neutral-800">Github Pages</span>
            </div>
        </div>
    </footer>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        let libraryData = null;
        let currentPath = [];

        const REPO_OWNER = window.location.hostname.split('.')[0];
        const REPO_NAME = window.location.pathname.split('/')[1] || 'activities';

        async function init() {
            try {
                const response = await fetch('metadata.json');
                libraryData = await response.json();

                document.getElementById('download-all-btn').href = `https://github.com/${REPO_OWNER}/${REPO_NAME}/releases/download/latest/activity-books-full.zip`;

                // Handle initial navigation if any hash exists
                handleHashChange();
                window.addEventListener('hashchange', handleHashChange);
            } catch (e) {
                console.error("Initialization failed", e);
            }
        }

        function handleHashChange() {
            const hash = window.location.hash.replace('#', '');
            currentPath = hash ? hash.split('/').filter(p => p) : [];
            render();
        }

        function navigateToRoot() { window.location.hash = ''; }
        function navigateToFolder(folderName) {
            const newPath = [...currentPath, folderName];
            window.location.hash = newPath.join('/');
        }

        function getCurrentFolder() {
            let current = libraryData;
            for (const step of currentPath) {
                const found = current.contents.find(item => item.name === step && item.type === 'directory');
                if (found) current = found;
                else break;
            }
            return current;
        }

        function render() {
            const folder = getCurrentFolder();
            const grid = document.getElementById('content-grid');
            const folderNameEl = document.getElementById('current-folder-name');
            const statsEl = document.getElementById('folder-stats');
            const breadcrumb = document.getElementById('breadcrumb');
            const downloadFolderBtn = document.getElementById('download-folder-btn');

            grid.innerHTML = '';
            folderNameEl.innerText = folder.name;

            // Stats
            const fileCount = folder.contents.filter(i => i.type === 'file').length;
            const dirCount = folder.contents.filter(i => i.type === 'directory').length;
            statsEl.innerText = `${dirCount} Categories / ${fileCount} Resources`;

            // Breadcrumbs
            breadcrumb.innerHTML = `<span class="breadcrumb-item cursor-pointer hover:text-white" onclick="navigateToRoot()">Root</span>`;
            let breadPath = [];
            currentPath.forEach((step, i) => {
                breadPath.push(step);
                const isLast = i === currentPath.length - 1;
                breadcrumb.innerHTML += `<span class="breadcrumb-item ${isLast ? 'text-white' : 'cursor-pointer hover:text-white'}" onclick="${isLast ? '' : `window.location.hash='${breadPath.join('/')}'`}">${step}</span>`;
            });

            // Download Folder Button
            if (currentPath.length > 0) {
                downloadFolderBtn.classList.remove('hidden');
                // Construct zip name based on current folder
                const zipName = currentPath[currentPath.length - 1].toLowerCase().replace(/\s+/g, '-') + '.zip';
                downloadFolderBtn.onclick = () => {
                    window.location.href = `https://github.com/${REPO_OWNER}/${REPO_NAME}/releases/download/latest/${zipName}`;
                };
            } else {
                downloadFolderBtn.classList.add('hidden');
            }

            if (folder.contents.length === 0) {
                document.getElementById('empty-state').classList.remove('hidden');
            } else {
                document.getElementById('empty-state').classList.add('hidden');
                folder.contents.forEach(item => {
                    const el = item.type === 'directory' ? createFolderCard(item) : createFileCard(item);
                    grid.appendChild(el);
                });
            }
            window.scrollTo(0, 0);
        }

        function createFolderCard(item) {
            const div = document.createElement('div');
            div.className = 'flex flex-col group cursor-pointer fade-in';
            div.onclick = () => navigateToFolder(item.name);

            div.innerHTML = `
                <div class="thumbnail-container rounded-2xl flex items-center justify-center border border-white/5 mb-4 group-hover:border-white/20 transition-all">
                    <svg class="w-16 h-16 folder-icon text-white/10 group-hover:text-white/20 transition-all duration-500" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M10 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"></path>
                    </svg>
                </div>
                <h3 class="bebas text-xl tracking-wider mb-1 truncate">${item.name}</h3>
                <p class="text-[10px] font-bold uppercase tracking-widest text-neutral-600">${item.contents.length} Items</p>
            `;
            return div;
        }

        function createFileCard(item) {
            const div = document.createElement('div');
            div.className = 'flex flex-col group fade-in';

            const thumbId = 'thumb-' + Math.random().toString(36).substr(2, 9);

            div.innerHTML = `
                <div class="thumbnail-container rounded-2xl mb-4 card-anim border border-white/5 relative overflow-hidden group">
                    <canvas id="${thumbId}"></canvas>
                    <div class="absolute inset-0 bg-black/60 opacity-0 group-hover:opacity-100 transition-all duration-500 flex flex-col items-center justify-center p-6 text-center">
                         <a href="${item.path}" download class="bg-white text-black w-10 h-10 rounded-full flex items-center justify-center hover:scale-110 transition-transform mb-3">
                             <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                         </a>
                         <p class="text-[9px] uppercase font-bold tracking-[0.2em] leading-relaxed">${item.name}</p>
                    </div>
                </div>
                <h3 class="text-[11px] font-bold uppercase tracking-widest text-neutral-400 truncate">${item.name}</h3>
                <p class="text-[9px] font-mono text-neutral-700 mt-1">${formatSize(item.size)}</p>
            `;

            renderThumbnail(item.path, thumbId);
            return div;
        }

        async function renderThumbnail(path, canvasId) {
            try {
                const loadingTask = pdfjsLib.getDocument(path);
                const pdf = await loadingTask.promise;
                const page = await pdf.getPage(1);

                const viewport = page.getViewport({ scale: 0.5 });
                const canvas = document.getElementById(canvasId);
                const context = canvas.getContext('2d');
                canvas.height = viewport.height;
                canvas.width = viewport.width;

                await page.render({ canvasContext: context, viewport: viewport }).promise;
            } catch (e) {
                console.error("Thumbnail failed for: " + path);
            }
        }

        function formatSize(bytes) {
            if (!bytes) return 'N/A';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
        }

        init();
    </script>
</body>
</html>
