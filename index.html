<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activity Books — Digital Library</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@300;400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #fdfcf9;
            color: #1a1a1a;
        }
        .serif {
            font-family: 'Crimson Pro', serif;
        }
        .card-hover:hover {
            transform: translateY(-2px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
        }
        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
    </style>
</head>
<body class="p-6 md:p-12 lg:p-24 max-w-6xl mx-auto">

    <!-- Header Section -->
    <header class="mb-20">
        <div class="flex flex-col md:flex-row md:items-end justify-between gap-8 border-b border-stone-200 pb-12">
            <div>
                <h1 class="serif text-5xl md:text-7xl font-light mb-4 tracking-tight">Activity Books</h1>
                <p class="text-stone-500 uppercase tracking-widest text-xs font-medium">Digital Resource Repository</p>
            </div>
            <div class="flex items-center gap-6">
                <a id="download-all-link" href="#" class="group relative px-6 py-3 border border-stone-800 text-stone-800 text-sm overflow-hidden transition-all hover:text-white">
                    <span class="relative z-10 font-medium">Download All (.zip)</span>
                    <div class="absolute inset-0 bg-stone-800 translate-y-full group-hover:translate-y-0 transition-transform duration-300"></div>
                </a>
            </div>
        </div>
    </header>

    <!-- Main Content Area -->
    <main id="file-browser" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-12 min-h-[400px]">
        <!-- Content injected by JavaScript -->
    </main>

    <!-- Footer Section -->
    <footer class="mt-40 pt-12 border-t border-stone-200 text-center">
        <p class="serif italic text-stone-500 text-xl mb-6">"Our aim is to provide quality resources for the community."</p>
        <div class="flex flex-col md:flex-row justify-between items-center gap-4 text-xs text-stone-400 uppercase tracking-widest font-medium">
            <p>&copy; 2026 Digital Library</p>
            <p class="text-stone-600 font-bold">Iltemase Dua</p>
            <p>Built with GitHub Pages</p>
        </div>
    </footer>

    <script>
        // Configuration
        const REPO_OWNER = window.location.hostname.split('.')[0];
        const REPO_NAME = window.location.pathname.split('/')[1] || 'Activity-Books';
        const RELEASE_ZIP_NAME = 'activity-books-full.zip';

        async function init() {
            try {
                // Fetch the generated metadata
                const response = await fetch('metadata.json');
                const data = await response.json();

                // Update "Download All" link to point to the GitHub Release asset
                // We assume a 'latest' tag is used for the release
                const downloadAllLink = document.getElementById('download-all-link');
                downloadAllLink.href = `https://github.com/${REPO_OWNER}/${REPO_NAME}/releases/download/latest/${RELEASE_ZIP_NAME}`;

                renderBrowser(data.files);
            } catch (error) {
                console.error('Error initializing site:', error);
                document.getElementById('file-browser').innerHTML = `
                    <p class="col-span-full text-stone-400 italic">Error loading metadata. Please check if metadata.json exists.</p>
                `;
            }
        }

        function formatSize(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
        }

        function renderBrowser(files) {
            const container = document.getElementById('file-browser');
            container.innerHTML = '';

            files.forEach(item => {
                if (item.type === 'directory') {
                    const card = document.createElement('section');
                    card.className = 'flex flex-col group';

                    card.innerHTML = `
                        <div class="flex items-center gap-3 mb-6">
                            <h2 class="serif text-2xl font-semibold">${item.name}</h2>
                            <span class="text-[10px] text-stone-400 border border-stone-200 px-2 py-0.5 rounded-full uppercase tracking-tighter">
                                ${item.contents.length} Items
                            </span>
                        </div>
                        <ul class="space-y-4">
                            ${item.contents.slice(0, 5).map(file => `
                                <li class="group/item flex justify-between items-start gap-4">
                                    <a href="${file.path}" download class="text-sm text-stone-600 hover:text-stone-900 line-clamp-2 leading-relaxed transition-colors">
                                        ${file.name}
                                    </a>
                                    <span class="text-[10px] text-stone-300 font-mono whitespace-nowrap mt-1">${formatSize(file.size)}</span>
                                </li>
                            `).join('')}
                            ${item.contents.length > 5 ? `
                                <li class="pt-2">
                                    <button class="text-[10px] uppercase tracking-widest text-stone-400 hover:text-stone-800 transition-colors font-bold" onclick="alert('See all ${item.name} items coming soon')">
                                        + ${item.contents.length - 5} More Resources
                                    </button>
                                </li>
                            ` : ''}
                        </ul>
                    `;
                    container.appendChild(card);
                } else if (item.type === 'file') {
                    // Standalone files
                    const card = document.createElement('div');
                    card.className = 'border border-stone-100 p-8 flex flex-col justify-between card-hover bg-white';
                    card.innerHTML = `
                        <div>
                            <div class="w-10 h-12 bg-stone-50 border border-stone-200 mb-6 flex items-center justify-center">
                                <span class="text-[8px] font-bold text-stone-300 uppercase">PDF</span>
                            </div>
                            <h3 class="serif text-xl font-medium mb-2 line-clamp-2">${item.name}</h3>
                            <p class="text-xs text-stone-400 mb-8">${formatSize(item.size)}</p>
                        </div>
                        <a href="${item.path}" download class="text-xs font-bold uppercase tracking-widest text-stone-800 border-b border-stone-800 pb-1 self-start hover:border-transparent transition-all">
                            Download
                        </a>
                    `;
                    container.appendChild(card);
                }
            });
        }

        init();
    </script>
</body>
</html>
